<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | 2M Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Fundo de Luzes -->
    <div class="bg-layer">
        <div class="shape-1"></div>
        <div class="shape-2"></div>
    </div>

    <!-- Link Home -->
    <a href="index.html" class="home-link transition">
        <svg width="12" height="12" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.84182 3.13514C9.04327 3.32401 9.05348 3.64042 8.86462 3.84188L5.43521 7.49991L8.86462 11.1579C9.05348 11.3594 9.04327 11.6758 8.84182 11.8647C8.64036 12.0488 8.32394 12.0488 8.13508 11.8419L4.38508 7.84188C4.20265 7.64728 4.20265 7.35253 4.38508 7.15793L8.13508 3.15793C8.32394 2.95647 8.64036 2.94626 8.84182 3.13514Z" fill="currentColor"></path></svg>
        Home
    </a>

    <!-- Container Central -->
    <div class="w-full max-w-[400px] flex flex-col items-center">
        
        <h1 class="text-[24px] font-semibold tracking-tight mb-2">Create Account</h1>
        <p class="text-[15px] text-zinc-500 mb-8">
            Already have an account? <a href="login.html" class="text-white hover:underline">Log in</a>.
        </p>

        <!-- Botões Sociais -->
        <div class="grid grid-cols-2 gap-3 w-full mb-6">
            <button class="btn-pill" onclick="loginGoogle()">
                <!-- Google Icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Log in with Google
            </button>

            <button class="btn-pill" onclick="loginGithub()">
                <!-- GitHub Icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.419 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.577.688.48C19.137 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                Log in with GitHub
            </button>
        </div>

        <!-- Divisor -->
        <div class="flex items-center w-full mb-6">
            <div class="divider-line"></div>
            <span class="px-4 text-[11px] text-zinc-600 font-medium">or</span>
            <div class="divider-line"></div>
        </div>

        <!-- Formulário -->
        <form class="w-full flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <label class="text-[13px] text-zinc-400 font-medium">Email</label>
                <input type="email" id="emailInput" placeholder="alan.turing@example.com" class="input-field">
            </div>

        <div class="flex flex-col gap-2 relative">
            <label class="text-[13px] text-zinc-400 font-medium ml-0.5">Password</label>
            <div class="relative w-full">
                <input type="password" id="passwordInput" placeholder="••••••••••••" class="input-field w-full">
                <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-300 transition-colors">
                    <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

            <button type="button" id="createBtn" class="btn-pill btn-submit">
                Create account
            </button>
        </form>

        <p class="mt-8 text-[11px] text-zinc-600 text-center leading-relaxed px-8">
            By signing up, you agree to our <a href="#" class="underline">Terms</a>, <a href="#" class="underline">Acceptable Use</a>, and <a href="#" class="underline">Privacy Policy</a>.
        </p>
    </div>

    <script src="script.js"></script>
    
</body>


</body>
</html>
